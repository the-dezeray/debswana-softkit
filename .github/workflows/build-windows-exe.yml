name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          native-image-job-reports: 'true'

      - name: Install ImageMagick
        run: choco install imagemagick -y --no-progress

      - name: Convert PNG to ICO
        run: |
          magick src/main/resources/assets/debswana-mini-logo.png `
            -define icon:auto-resize="256,128,64,48,32,16" `
            debswana.ico

      - name: Build fat JAR
        run: mvn package -DskipTests -q

      - name: Build native EXE
        run: |
          native-image `
            -jar target/DebswanaSoftwareKit-fat.jar `
            -H:Name=DebswanaSoftwareKit `
            -H:Class=com.example.App `
            -H:ConfigurationFileDirectories=src/main/resources/META-INF/native-image `
            --no-fallback `
            -H:+ReportExceptionStackTraces

      - name: Embed icon into EXE via rcedit
        run: |
          choco install rcedit -y --no-progress
          rcedit DebswanaSoftwareKit.exe --set-icon debswana.ico

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: DebswanaSoftwareKit
          path: DebswanaSoftwareKit.exe
          retention-days: 30
